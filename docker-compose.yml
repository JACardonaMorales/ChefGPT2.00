services:
  api:
    build: .
    container_name: api_service
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_server
    ports:
      - "5672:5672"  # RabbitMQ port
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  python-client:
    build: .
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: tail -f /dev/null  # Para exec manual

  worker:
    build: .
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    command: python worker.py  # Inicia automáticamente

volumes:
  mongo_data:
